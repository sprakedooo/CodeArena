<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson – CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* ── Lesson reader layout ───────────────────────────────────────── */
        .lesson-view-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding-bottom: 4rem;
        }

        /* ── Breadcrumb ─────────────────────────────────────────────────── */
        .lesson-breadcrumb {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.78rem; color: var(--text-muted);
            margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .lesson-breadcrumb a {
            color: var(--text-muted); text-decoration: none;
            display: flex; align-items: center; gap: 0.25rem;
            transition: color 0.15s;
        }
        .lesson-breadcrumb a:hover { color: var(--primary); }
        .lesson-breadcrumb .ms-icon { font-size: 0.9rem; }
        .lesson-breadcrumb .sep { opacity: 0.4; }

        /* ── Progress bar (top) ─────────────────────────────────────────── */
        .lesson-top-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.85rem 1.15rem;
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .lesson-top-bar-info { flex: 1; min-width: 0; }
        .lesson-path-name {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--primary); margin-bottom: 0.25rem;
        }
        .lesson-path-progress {
            display: flex; align-items: center; gap: 0.75rem;
        }
        .lesson-path-progress-bar {
            flex: 1; height: 5px;
            background: var(--bg-surface); border-radius: 3px; overflow: hidden;
        }
        .lesson-path-progress-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.6s ease;
        }
        .lesson-path-progress-label {
            font-size: 0.72rem; color: var(--text-muted);
            white-space: nowrap;
        }
        .lesson-top-bar-actions { display: flex; gap: 0.5rem; align-items: center; }
        .lesson-xp-chip {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.78rem; font-weight: 700; color: #fbbf24;
            background: rgba(251,191,36,0.12);
            padding: 0.3rem 0.7rem; border-radius: 20px;
            border: 1px solid rgba(251,191,36,0.2);
        }
        .lesson-xp-chip .ms-icon { font-size: 0.95rem; }

        /* ── Article ────────────────────────────────────────────────────── */
        .lesson-article {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .lesson-article-header {
            padding: 2rem 2.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .lesson-meta-row {
            display: flex; align-items: center; gap: 0.85rem;
            flex-wrap: wrap; margin-bottom: 0.85rem;
        }
        .lesson-meta-item {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.75rem; color: var(--text-muted);
        }
        .lesson-meta-item .ms-icon { font-size: 0.95rem; }
        .lesson-title {
            font-size: 1.65rem; font-weight: 800; color: var(--text);
            line-height: 1.3; margin: 0;
        }
        .lesson-article-body {
            padding: 2rem 2.5rem;
            line-height: 1.8; color: var(--text-secondary);
        }

        /* Article body typography */
        .lesson-article-body h2 {
            font-size: 1.2rem; font-weight: 700; color: var(--text);
            margin: 2rem 0 0.75rem; padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }
        .lesson-article-body h3 {
            font-size: 1rem; font-weight: 700; color: var(--text);
            margin: 1.5rem 0 0.5rem;
        }
        .lesson-article-body p { margin-bottom: 1rem; }
        .lesson-article-body ul, .lesson-article-body ol {
            padding-left: 1.5rem; margin-bottom: 1rem;
        }
        .lesson-article-body li { margin-bottom: 0.35rem; }
        .lesson-article-body strong { color: var(--text); }
        .lesson-article-body code {
            background: rgba(124,58,237,0.12); color: #a78bfa;
            padding: 0.15em 0.4em; border-radius: 4px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.88em;
        }
        .lesson-article-body pre code { background: none; color: inherit; padding: 0; }

        /* Info boxes */
        .lesson-article-body .info-box {
            background: rgba(124,58,237,0.08);
            border: 1px solid rgba(124,58,237,0.2);
            border-left: 4px solid var(--primary);
            border-radius: 8px; padding: 1rem 1.15rem;
            margin: 1.25rem 0; font-size: 0.88rem;
        }
        .lesson-article-body .info-box strong { color: var(--primary); }

        /* Code blocks */
        .lesson-article-body .code-block-wrap,
        .code-block-wrap {
            background: #0d1117 !important;
            border-radius: 10px; overflow: hidden;
            margin: 1.25rem 0; border: 1px solid rgba(255,255,255,0.06);
        }
        .code-block-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .code-block-header span {
            font-size: 0.7rem; color: rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .code-block-copy {
            background: none; border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5); font-size: 0.68rem;
            padding: 0.2rem 0.55rem; border-radius: 5px; cursor: pointer;
            transition: all 0.15s;
        }
        .code-block-copy:hover { border-color: var(--primary); color: var(--primary); }
        .code-block-wrap pre { margin: 0; padding: 1.15rem 1.25rem; background: #0d1117 !important; }
        .code-block-wrap code.hljs { background: #0d1117 !important; font-size: 0.88rem; }

        /* ── Article footer (navigation + complete) ─────────────────────── */
        .lesson-article-footer {
            padding: 1.5rem 2.5rem;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between;
            align-items: center; gap: 1rem; flex-wrap: wrap;
        }

        /* ── Complete button states ─────────────────────────────────────── */
        .btn-complete {
            display: inline-flex; align-items: center; gap: 0.45rem;
            font-size: 0.88rem; font-weight: 700;
            padding: 0.65rem 1.5rem; border-radius: 10px; cursor: pointer;
            border: none; transition: all 0.2s;
        }
        .btn-complete.pending {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,0.35);
        }
        .btn-complete.pending:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.45); }
        .btn-complete.done {
            background: rgba(16,185,129,0.1); color: #10b981;
            border: 1px solid rgba(16,185,129,0.3); cursor: default;
        }
        .btn-complete .ms-icon { font-size: 1.1rem; }

        /* ── Skeleton loader ────────────────────────────────────────────── */
        .skel {
            background: var(--bg-surface); border-radius: 6px;
            animation: skel-pulse 1.4s infinite;
        }
        @keyframes skel-pulse {
            0%,100%{ opacity: 0.5; } 50%{ opacity: 1; }
        }

        /* ── XP toast ────────────────────────────────────────────────────── */
        .xp-toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            color: #fff; font-size: 0.88rem; font-weight: 700;
            padding: 0.7rem 1.25rem; border-radius: 12px;
            display: flex; align-items: center; gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(124,58,237,0.45);
            animation: toast-in 0.3s ease, toast-out 0.3s ease 2.3s forwards;
            z-index: 10000; pointer-events: none;
        }
        @keyframes toast-in  { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
        @keyframes toast-out { from{ opacity:1; } to{ opacity:0; transform:translateY(6px); } }

        @media (max-width: 680px) {
            .lesson-article-header,
            .lesson-article-body,
            .lesson-article-footer { padding-left: 1.25rem; padding-right: 1.25rem; }
            .lesson-title { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="lesson-view-wrap">

    <!-- ── Breadcrumb ───────────────────────────────────────────────────── -->
    <nav class="lesson-breadcrumb">
        <a href="dashboard.html">
            <span class="material-symbols-outlined ms-icon">home</span>
            Dashboard
        </a>
        <span class="sep">/</span>
        <a href="learn.html">
            <span class="material-symbols-outlined ms-icon">menu_book</span>
            Learn
        </a>
        <span class="sep">/</span>
        <span id="breadcrumbLesson" style="color:var(--text);">Loading…</span>
    </nav>

    <!-- ── Path progress bar ────────────────────────────────────────────── -->
    <div class="lesson-top-bar" id="topBar" style="display:none;">
        <div class="lesson-top-bar-info">
            <div class="lesson-path-name" id="topBarPath">—</div>
            <div class="lesson-path-progress">
                <div class="lesson-path-progress-bar">
                    <div class="lesson-path-progress-fill" id="topBarFill" style="width:0%"></div>
                </div>
                <span class="lesson-path-progress-label" id="topBarLabel">—</span>
            </div>
        </div>
        <div class="lesson-top-bar-actions">
        </div>
    </div>

    <!-- Skeleton while loading -->
    <div id="loadingState">
        <div class="lesson-article">
            <div class="lesson-article-header">
                <div class="skel" style="height:14px;width:35%;margin-bottom:1rem;"></div>
                <div class="skel" style="height:32px;width:75%;"></div>
            </div>
            <div class="lesson-article-body">
                <div class="skel" style="height:12px;width:90%;margin-bottom:0.75rem;"></div>
                <div class="skel" style="height:12px;width:80%;margin-bottom:0.75rem;"></div>
                <div class="skel" style="height:12px;width:65%;margin-bottom:1.5rem;"></div>
                <div class="skel" style="height:80px;border-radius:10px;margin-bottom:1.5rem;"></div>
                <div class="skel" style="height:12px;width:88%;margin-bottom:0.75rem;"></div>
                <div class="skel" style="height:12px;width:70%;"></div>
            </div>
        </div>
    </div>

    <!-- ── Lesson article ───────────────────────────────────────────────── -->
    <div class="lesson-article" id="lessonArticle" style="display:none;">
        <div class="lesson-article-header">
            <div class="lesson-meta-row">
                <span class="lesson-meta-item">
                    <span class="material-symbols-outlined ms-icon">schedule</span>
                    <span id="metaMins">—</span>
                </span>
                <span class="lesson-meta-item">
                    <span class="material-symbols-outlined ms-icon">format_list_numbered</span>
                    Lesson <span id="metaNum" style="margin-left:0.2rem;">—</span>
                </span>
                <span class="lesson-meta-item" id="metaLangBadge">
                    <span class="material-symbols-outlined ms-icon">code</span>
                    <span id="metaLang">—</span>
                </span>
            </div>
            <h1 class="lesson-title" id="lessonTitle">Loading…</h1>
        </div>

        <div class="lesson-article-body" id="lessonBody">
            <!-- content injected here -->
        </div>

        <div class="lesson-article-footer">
            <!-- Prev -->
            <button class="btn btn-ghost" id="prevBtn" style="display:none;" onclick="goLesson('prev')">
                <span class="material-symbols-outlined" style="font-size:1rem;">arrow_back</span>
                <span id="prevLabel">Previous</span>
            </button>
            <span id="prevPlaceholder"></span>

            <!-- Mark Complete -->
            <button class="btn-complete pending" id="completeBtn" onclick="markComplete()">
                <span class="material-symbols-outlined ms-icon">check_circle</span>
                Mark as Complete
            </button>

            <!-- Next -->
            <button class="btn btn-primary" id="nextBtn" style="display:none;" onclick="goLesson('next')">
                <span id="nextLabel">Next Lesson</span>
                <span class="material-symbols-outlined" style="font-size:1rem;">arrow_forward</span>
            </button>
            <span id="nextPlaceholder"></span>
        </div>
    </div>

    <!-- Error state -->
    <div id="errorState" style="display:none;text-align:center;padding:4rem 1rem;">
        <span class="material-symbols-outlined" style="font-size:3rem;color:var(--text-muted);">error</span>
        <h2 style="color:var(--text);margin:1rem 0 0.5rem;">Lesson not found</h2>
        <p style="color:var(--text-muted);">The lesson you're looking for doesn't exist or isn't published.</p>
        <a href="learn.html" class="btn btn-primary" style="margin-top:1.25rem;">Browse All Lessons</a>
    </div>

</div><!-- end lesson-view-wrap -->

<script src="../js/sidebar.js"></script>
<script>
window.SIDEBAR_PAGE = 'learn';
const API = `http://${window.location.hostname}:3000/api`;

let lessonData  = null;
let prevLesson  = null;
let nextLesson  = null;

document.addEventListener('DOMContentLoaded', async () => {
    const user  = JSON.parse(localStorage.getItem('user') || '{}');
    const token = localStorage.getItem('token');
    if (!user.id) { location.href = 'login.html'; return; }

    const params   = new URLSearchParams(location.search);
    const lessonId = params.get('id') ? parseInt(params.get('id')) : null;

    if (!lessonId) {
        showError();
        return;
    }

    try {
        const res = await fetch(`${API}/paths/lesson/${lessonId}`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('not found');
        const data = await res.json();

        lessonData = data.lesson;
        prevLesson = data.prev;
        nextLesson = data.next;

        renderLesson(token);

        // Track last visited for dashboard "Continue Learning"
        try {
            localStorage.setItem('lastVisited', JSON.stringify({
                type:      'lesson',
                id:        lessonData.lesson_id,
                title:     lessonData.title,
                pathId:    lessonData.path_id,
                language:  lessonData.language || '',
                mins:      lessonData.estimated_minutes || 5,
                url:       `lesson_view.html?id=${lessonData.lesson_id}`,
                visitedAt: Date.now()
            }));
        } catch (_) {}

        // Mark as in_progress (non-blocking)
        fetch(`${API}/paths/lesson/${lessonId}/start`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` }
        }).catch(() => {});

    } catch {
        showError();
    }
});

function renderLesson(token) {
    const lesson = lessonData;

    document.title = `${lesson.title} – CodeArena`;

    // Breadcrumb
    document.getElementById('breadcrumbLesson').textContent = lesson.title;

    // Top progress bar — fetch path info
    loadPathProgress(lesson.path_id, token);

    // Meta
    document.getElementById('metaMins').textContent   = `${lesson.estimated_minutes || 5} min read`;
    document.getElementById('metaNum').textContent    = lesson.order_index || '—';
    document.getElementById('metaLang').textContent   = capitalize(lesson.language || 'python');
    document.getElementById('lessonTitle').textContent = lesson.title;

    // Body
    document.getElementById('lessonBody').innerHTML = renderContent(lesson.content || '<p>No content available.</p>');

    // Syntax highlight
    document.querySelectorAll('#lessonBody pre code').forEach(el => hljs.highlightElement(el));

    // Navigation buttons
    if (prevLesson) {
        document.getElementById('prevBtn').style.display   = '';
        document.getElementById('prevPlaceholder').style.display = 'none';
        document.getElementById('prevLabel').textContent = prevLesson.title;
    } else {
        document.getElementById('prevPlaceholder').style.display = '';
    }

    if (nextLesson) {
        document.getElementById('nextBtn').style.display   = '';
        document.getElementById('nextPlaceholder').style.display = 'none';
        document.getElementById('nextLabel').textContent = nextLesson.title;
    } else {
        document.getElementById('nextPlaceholder').style.display = '';
    }

    // Already completed?
    if (lesson.progress_status === 'completed') {
        setCompletedState();
    }

    // Show lesson, hide loader
    document.getElementById('loadingState').style.display  = 'none';
    document.getElementById('lessonArticle').style.display = '';
}

async function loadPathProgress(pathId, token) {
    try {
        const res = await fetch(`${API}/paths/${pathId}`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        const path    = data.path;
        const lessons = data.lessons || [];
        const done    = lessons.filter(l => l.progress_status === 'completed').length;
        const total   = lessons.length;
        const pct     = total ? Math.round((done / total) * 100) : 0;

        document.getElementById('topBarPath').textContent  = path.title;
        document.getElementById('topBarFill').style.width  = pct + '%';
        document.getElementById('topBarLabel').textContent = `${done}/${total} lessons`;
        document.getElementById('topBar').style.display    = '';
    } catch { /* non-fatal */ }
}

async function markComplete() {
    const btn   = document.getElementById('completeBtn');
    const token = localStorage.getItem('token');
    if (!btn || btn.classList.contains('done')) return;

    btn.disabled   = true;
    btn.innerHTML  = `<span class="material-symbols-outlined ms-icon">hourglass_empty</span> Saving…`;

    try {
        const res  = await fetch(`${API}/paths/lesson/${lessonData.lesson_id}/complete`, {
            method:  'POST',
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.success) {
            lessonData.progress_status = 'completed';
            setCompletedState();

            if (!data.alreadyCompleted) {
                // Refresh path progress bar
                loadPathProgress(lessonData.path_id, token);
            }

            // Auto-advance to next lesson after 1.5s if available
            if (nextLesson) {
                setTimeout(() => {
                    if (confirm(`Lesson complete! 🎉 Move on to "${nextLesson.title}"?`)) {
                        goLesson('next');
                    }
                }, 1600);
            }
        } else {
            btn.disabled  = false;
            btn.innerHTML = `<span class="material-symbols-outlined ms-icon">check_circle</span> Mark as Complete`;
        }
    } catch {
        btn.disabled  = false;
        btn.innerHTML = `<span class="material-symbols-outlined ms-icon">check_circle</span> Mark as Complete`;
    }
}

function setCompletedState() {
    const btn = document.getElementById('completeBtn');
    btn.className = 'btn-complete done';
    btn.disabled  = true;
    btn.innerHTML = `<span class="material-symbols-outlined ms-icon">check_circle</span> Completed`;
}

function goLesson(dir) {
    const target = dir === 'prev' ? prevLesson : nextLesson;
    if (target) {
        location.href = `lesson_view.html?id=${target.lesson_id}`;
    }
}

function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = '';
}


// ── Content renderer ──────────────────────────────────────────────────────────
function renderContent(content) {
    // If content has HTML tags, render directly but also handle code fences
    let html = content
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
            const l = lang || 'plaintext';
            return `<div class="code-block-wrap">
                <div class="code-block-header">
                    <span>${l}</span>
                    <button class="code-block-copy" onclick="copyCode(this)">Copy</button>
                </div>
                <pre><code class="language-${l}">${escHtml(code.trim())}</code></pre>
            </div>`;
        });

    // If not already HTML, apply simple markdown
    if (!html.includes('<h') && !html.includes('<div') && !html.includes('<ul') && !html.includes('<p>')) {
        html = html
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,     '<em>$1</em>')
            .replace(/`([^`]+)`/g,     '<code>$1</code>')
            .replace(/\n{2,}/g, '</p><p>')
            .replace(/\n/g, '<br>');
        html = '<p>' + html + '</p>';
    }
    return html;
}

function copyCode(btn) {
    const code = btn.closest('.code-block-wrap').querySelector('pre').textContent;
    navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
    });
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
