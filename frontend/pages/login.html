<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 0 1.5rem;
        }

        .login-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-logo .brk  { color: var(--text-muted); }
        .login-logo .code { color: var(--primary); }
        .login-logo .arena{ color: var(--success); }

        .login-tagline {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
        }

        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .login-footer a { color: var(--primary); font-weight: 600; }

        .demo-box {
            margin-top: 1rem;
            padding: 0.65rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .demo-box code {
            color: var(--secondary);
            background: rgba(6,182,212,0.1);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }

        .admin-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
        }
        .admin-link a { color: var(--text-muted); }
        .admin-link a:hover { color: var(--primary); }

        .login-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 18%;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 50;
        }
        .login-nav-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .login-nav-logo .brk  { color: var(--text-muted); }
        .login-nav-logo .code { color: var(--primary); }
        .login-nav-logo .arena{ color: var(--success); }

        .login-nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .login-nav-links a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .login-nav-links a:hover { color: var(--text); }
        .login-nav-links .btn-signup {
            background: linear-gradient(135deg, var(--primary), #9333ea);
            color: white;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .login-nav-links .btn-signup:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

    <nav class="login-nav">
        <a href="index.html" class="login-nav-logo">
            <span class="brk">&lt;</span><span class="code">Code</span><span class="arena">Arena</span><span class="brk">/&gt;</span>
        </a>
        <div class="login-nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="btn-signup">Sign up</a>
        </div>
    </nav>

    <div class="login-box" style="margin-top: 4rem;">

        <div class="login-logo">
            <span class="brk">&lt;</span><span class="code">Code</span><span class="arena">Arena</span><span class="brk">/&gt;</span>
        </div>
        <p class="login-tagline">Welcome back! Log in to continue.</p>

        <div class="login-card">
            <div id="alertBox"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 0.5rem;">
                    Log In
                </button>
            </form>

            <div class="login-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>

        <div class="demo-box">
            Demo: <code>student@example.com</code> / <code>student123</code>
        </div>

        <div class="admin-link">
            <a href="faculty_dashboard.html">Faculty Portal</a>
        </div>

    </div>

    <script>
        const API = 'http://localhost:3000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn      = e.target.querySelector('button[type="submit"]');

            btn.textContent = 'Logging in...';
            btn.disabled = true;

            try {
                const res  = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('isLoggedIn', 'true');
                    if (data.token) localStorage.setItem('token', data.token);
                    btn.textContent = 'Success!';
                    setTimeout(() => {
                        if (data.user.role === 'faculty') {
                            window.location.href = 'faculty_dashboard.html';
                        } else {
                            window.location.href = data.user.selectedLanguage ? 'dashboard.html' : 'select_language.html';
                        }
                    }, 400);
                } else {
                    document.getElementById('alertBox').innerHTML =
                        `<div class="alert alert-error">${data.message}</div>`;
                    btn.textContent = 'Log In';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('alertBox').innerHTML =
                    '<div class="alert alert-error">Cannot connect to server.</div>';
                btn.textContent = 'Log In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
