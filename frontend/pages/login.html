<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 0 1.5rem;
        }

        .login-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-logo .brk  { color: var(--text-muted); }
        .login-logo .code { color: var(--primary); }
        .login-logo .arena{ color: var(--success); }

        .login-tagline {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
        }

        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .login-footer a { color: var(--primary); font-weight: 600; }

        .demo-box {
            margin-top: 1rem;
            padding: 0.65rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .demo-box code {
            color: var(--secondary);
            background: rgba(6,182,212,0.1);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }

        .admin-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
        }
        .admin-link a { color: var(--text-muted); }
        .admin-link a:hover { color: var(--primary); }

        .login-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 18%;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 50;
        }
        .login-nav-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .login-nav-logo .brk  { color: var(--text-muted); }
        .login-nav-logo .code { color: var(--primary); }
        .login-nav-logo .arena{ color: var(--success); }

        .login-nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .login-nav-links a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .login-nav-links a:hover { color: var(--text); }
        .login-nav-links .btn-signup {
            background: linear-gradient(135deg, var(--primary), #9333ea);
            color: white;
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .login-nav-links .btn-signup:hover { color: white; opacity: 0.9; }
    </style>
</head>
<body>

    <nav class="login-nav">
        <a href="index.html" class="login-nav-logo">
            <img src="../assets/codearena-logo.png" alt="CodeArena" style="height:55px;width:auto;object-fit:contain;vertical-align:middle;">
        </a>
        <div class="login-nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="btn-signup">Sign up</a>
        </div>
    </nav>

    <div class="login-box" style="margin-top: 4rem;">

        <div class="login-logo">
            <img src="../assets/codearena-logo.png" alt="CodeArena" style="height:140px;width:auto;object-fit:contain;">
        </div>
        <p class="login-tagline">Welcome. Please login to continue.</p>

        <div class="login-card">
            <div id="alertBox"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 0.5rem;">
                    Log In
                </button>
            </form>

            <!-- ── Divider ── -->
            <div style="display:flex;align-items:center;gap:12px;margin:20px 0 4px;">
                <div style="flex:1;height:1px;background:var(--border);"></div>
                <span style="font-size:0.75rem;color:var(--text-muted);">or</span>
                <div style="flex:1;height:1px;background:var(--border);"></div>
            </div>

            <!-- ── Google OAuth button ── -->
            <a id="google-oauth-btn" href="#"
               onclick="this.href=`http://${window.location.hostname}:3000/api/auth/google`"
               style="display:flex;align-items:center;justify-content:center;gap:10px;
                      width:100%;padding:11px 0;border-radius:8px;
                      border:1px solid var(--border);background:var(--bg-surface);
                      color:var(--text);font-size:0.9rem;font-weight:500;
                      text-decoration:none;transition:border-color 0.2s,background 0.2s;
                      margin-bottom:20px;"
               onmouseover="this.style.borderColor='#4285F4';this.style.background='var(--bg-card)';"
               onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--bg-surface)';">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Continue with Google
            </a>

            <div class="login-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>


    </div>

    <script>
        const API = `http://${window.location.hostname}:3000/api`;

        function clearUserProgress() {
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('completedLessons') ||
                    key.startsWith('quizProgress') ||
                    key.startsWith('lessonProgress') ||
                    key.startsWith('gameStats') ||
                    key.startsWith('streak') ||
                    key.startsWith('lastPlayed')) {
                    keysToRemove.push(key);
                }
            }
            keysToRemove.forEach(k => localStorage.removeItem(k));
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn      = e.target.querySelector('button[type="submit"]');

            btn.textContent = 'Logging in...';
            btn.disabled = true;

            try {
                const res  = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    // Clear progress if a different user is logging in
                    const prevUser = JSON.parse(localStorage.getItem('user') || '{}');
                    if (prevUser.id && prevUser.id !== data.user.id) clearUserProgress();
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('isLoggedIn', 'true');
                    if (data.token) localStorage.setItem('token', data.token);
                    btn.textContent = 'Success!';
                    setTimeout(() => {
                        if (data.user.role === 'faculty') {
                            window.location.href = 'faculty_dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 400);
                } else {
                    document.getElementById('alertBox').innerHTML =
                        `<div class="alert alert-error">${data.message}</div>`;
                    btn.textContent = 'Log In';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('alertBox').innerHTML =
                    '<div class="alert alert-error">Cannot connect to server.</div>';
                btn.textContent = 'Log In';
                btn.disabled = false;
            }
        });
    </script>
<script src="../js/theme.js"></script>
</body>
</html>
