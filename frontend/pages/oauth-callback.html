<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signing you in… — CodeArena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* ── spinner screen ─────────────────────────────────────────────────── */
        #spinner-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
        .err {
            color: var(--danger, #ef4444);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            text-align: center;
            max-width: 340px;
        }

        /* ── role picker screen ─────────────────────────────────────────────── */
        #role-screen {
            display: none;
            min-height: 100vh;
            background: var(--bg-dark, #0d1117);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 40px;
            padding: 24px;
        }

        .role-header {
            text-align: center;
        }
        .role-header .pixel-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            color: var(--primary, #7c3aed);
            margin-bottom: 16px;
            display: block;
        }
        .role-header h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.85rem;
            color: var(--text, #e6edf3);
            margin: 0 0 10px;
            line-height: 1.6;
        }
        .role-header p {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text-secondary, #8b949e);
            margin: 0;
        }

        .role-cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .role-card {
            background: var(--card, #161b22);
            border: 2px solid var(--border, #30363d);
            border-radius: 16px;
            padding: 36px 40px;
            width: 220px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .role-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .role-card.selected {
            border-color: var(--primary, #7c3aed);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
        }
        .role-card .check-ring {
            position: absolute;
            top: 12px; right: 12px;
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border, #30363d);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            color: transparent;
            transition: all 0.2s;
        }
        .role-card.selected .check-ring {
            background: var(--primary, #7c3aed);
            border-color: var(--primary, #7c3aed);
            color: #fff;
        }
        .role-card .icon-wrap {
            width: 72px; height: 72px;
            border-radius: 50%;
            margin: 0 auto 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px;
        }
        .role-card.student-card .icon-wrap {
            background: rgba(6, 182, 212, 0.12);
        }
        .role-card.faculty-card .icon-wrap {
            background: rgba(251, 191, 36, 0.12);
        }
        .role-card h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--text, #e6edf3);
            margin: 0 0 10px;
        }
        .role-card p {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-secondary, #8b949e);
            line-height: 1.5;
            margin: 0;
        }
        .role-card.student-card:hover,
        .role-card.student-card.selected {
            border-color: var(--secondary, #06b6d4);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.2);
        }
        .role-card.faculty-card:hover,
        .role-card.faculty-card.selected {
            border-color: var(--warning, #fbbf24);
            box-shadow: 0 0 0 3px rgba(251,191,36,0.2);
        }
        .role-card.student-card.selected .check-ring {
            background: var(--secondary, #06b6d4);
            border-color: var(--secondary, #06b6d4);
        }
        .role-card.faculty-card.selected .check-ring {
            background: var(--warning, #fbbf24);
            border-color: var(--warning, #fbbf24);
            color: #000;
        }

        .continue-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            padding: 16px 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: var(--primary, #7c3aed);
            color: #fff;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.15s, opacity 0.2s;
        }
        .continue-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .continue-btn:not(:disabled):hover {
            background: #6d28d9;
            transform: translateY(-2px);
        }
        .continue-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin:0; background: var(--bg-dark, #0d1117);">

    <!-- Spinner (shown while loading) -->
    <div id="spinner-screen">
        <div class="spinner" id="spinner"></div>
        <div class="msg"  id="msg">Signing you in…</div>
        <div class="err"  id="err" style="display:none;"></div>
    </div>

    <!-- Role picker (shown for new Google users) -->
    <div id="role-screen">
        <div class="role-header">
            <span class="pixel-logo">CodeArena</span>
            <h1>Who are you?</h1>
            <p>Choose your role to complete sign-up.</p>
        </div>

        <div class="role-cards">
            <div class="role-card student-card" id="card-student" onclick="selectRole('student')">
                <div class="check-ring" id="check-student">✓</div>
                <div class="icon-wrap">🎮</div>
                <h2>Student</h2>
                <p>Learn programming through quizzes, lessons, and game-based challenges.</p>
            </div>
            <div class="role-card faculty-card" id="card-faculty" onclick="selectRole('faculty')">
                <div class="check-ring" id="check-faculty">✓</div>
                <div class="icon-wrap">🧑‍🏫</div>
                <h2>Faculty</h2>
                <p>Create classrooms, assign content, and track student progress.</p>
            </div>
        </div>

        <button class="continue-btn" id="continueBtn" disabled onclick="confirmRole()">
            Continue →
        </button>
    </div>

    <script>
    (function () {
        /* ── parse URL params ─────────────────────────────────────────────── */
        const params   = new URLSearchParams(window.location.search);
        const error    = params.get('error');
        const token    = params.get('token');
        const userRaw  = params.get('user');
        const isNewUser = params.get('new') === '1';

        /* ── error state ─────────────────────────────────────────────────── */
        if (error || !token || !userRaw) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('msg').style.display = 'none';
            const errEl = document.getElementById('err');
            errEl.style.display = 'block';
            errEl.textContent = 'Google sign-in failed. Please try again.';
            setTimeout(() => window.location.href = 'login.html', 3000);
            return;
        }

        let user;
        try {
            user = JSON.parse(decodeURIComponent(userRaw));
        } catch {
            document.getElementById('err').textContent = 'Something went wrong. Redirecting…';
            document.getElementById('err').style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 2000);
            return;
        }

        /* ── clear old progress if different user ────────────────────────── */
        const prevUser = JSON.parse(localStorage.getItem('user') || '{}');
        if (prevUser.id && prevUser.id !== user.id) {
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (['completedLessons','quizProgress','lessonProgress','gameStats','streak','lastPlayed']
                    .some(prefix => k.startsWith(prefix))) {
                    keysToRemove.push(k);
                }
            }
            keysToRemove.forEach(k => localStorage.removeItem(k));
        }

        /* ── store auth ───────────────────────────────────────────────────── */
        localStorage.setItem('token',      token);
        localStorage.setItem('user',       JSON.stringify(user));
        localStorage.setItem('isLoggedIn', 'true');

        /* ── branch: new user → show role picker, else → redirect ─────────── */
        if (isNewUser) {
            document.getElementById('spinner-screen').style.display = 'none';
            document.getElementById('role-screen').style.display    = 'flex';
        } else {
            finishLogin(user);
        }
    })();

    /* ── role picker logic ───────────────────────────────────────────────── */
    let chosenRole = null;

    function selectRole(role) {
        chosenRole = role;
        document.getElementById('card-student').classList.toggle('selected', role === 'student');
        document.getElementById('card-faculty').classList.toggle('selected', role === 'faculty');
        document.getElementById('continueBtn').disabled = false;
    }

    async function confirmRole() {
        if (!chosenRole) return;
        const btn = document.getElementById('continueBtn');
        btn.classList.add('loading');
        btn.textContent = 'Saving…';

        try {
            const token = localStorage.getItem('token');
            const res = await fetch('http://localhost:3000/api/auth/set-role', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                },
                body: JSON.stringify({ role: chosenRole }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Failed to set role');

            // Update stored user with new role
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            user.role = chosenRole;
            localStorage.setItem('user', JSON.stringify(user));

            finishLogin(user);
        } catch (err) {
            // If API fails, still continue with chosen role stored locally
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            user.role = chosenRole;
            localStorage.setItem('user', JSON.stringify(user));
            finishLogin(user);
        }
    }

    function finishLogin(user) {
        if (user.role === 'superadmin') {
            window.location.href = 'superadmin_dashboard.html';
        } else if (user.role === 'faculty') {
            window.location.href = 'faculty_dashboard.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    }
    </script>
</body>
</html>
