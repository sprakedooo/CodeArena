<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signing you in… — CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-dark);
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
        .err {
            color: var(--danger);
            font-size: 0.85rem;
            text-align: center;
            max-width: 340px;
        }
    </style>
</head>
<body>
    <div class="spinner" id="spinner"></div>
    <div class="msg" id="msg">Signing you in…</div>
    <div class="err" id="err" style="display:none;"></div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const error  = params.get('error');
            const token  = params.get('token');
            const userRaw = params.get('user');

            if (error || !token || !userRaw) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('msg').style.display = 'none';
                const errEl = document.getElementById('err');
                errEl.style.display = 'block';
                errEl.textContent = 'Google sign-in failed. Please try again.';
                setTimeout(() => window.location.href = 'login.html', 3000);
                return;
            }

            try {
                const user = JSON.parse(decodeURIComponent(userRaw));

                // Clear progress if a different user is signing in
                const prevUser = JSON.parse(localStorage.getItem('user') || '{}');
                if (prevUser.id && prevUser.id !== user.id) {
                    const keysToRemove = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key.startsWith('completedLessons') || key.startsWith('quizProgress') ||
                            key.startsWith('lessonProgress') || key.startsWith('gameStats') ||
                            key.startsWith('streak') || key.startsWith('lastPlayed')) {
                            keysToRemove.push(key);
                        }
                    }
                    keysToRemove.forEach(k => localStorage.removeItem(k));
                }

                // Store auth — same keys the rest of the app uses
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('isLoggedIn', 'true');

                document.getElementById('msg').textContent = 'Welcome, ' + (user.fullName || 'there') + '!';

                // Redirect based on role
                setTimeout(() => {
                    if (user.role === 'faculty') {
                        window.location.href = 'faculty_dashboard.html';
                    } else if (!user.selectedLanguage) {
                        window.location.href = 'select_language.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 800);
            } catch (e) {
                document.getElementById('err').textContent = 'Something went wrong. Redirecting…';
                document.getElementById('err').style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        })();
    </script>
</body>
</html>
