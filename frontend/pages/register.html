<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .register-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
        }

        .register-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-hero .hero-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .register-hero .hero-logo .code { color: var(--primary); }
        .register-hero .hero-logo .arena { color: var(--success); }
        .register-hero .hero-logo .brackets { color: var(--text-muted); }

        .register-hero .hero-tagline {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), var(--primary), var(--success));
        }

        .register-card h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            color: var(--text);
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 1px;
        }

        .register-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .register-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles-bg" id="particles"></div>

    <div class="register-page">
        <div class="register-container">
            <div class="register-hero">
                <div class="hero-logo">
                    <span class="brackets">&lt;</span><span class="code">Code</span><span class="arena">Arena</span><span class="brackets">/&gt;</span>
                </div>
                <div class="hero-tagline">Join The Adventure</div>
            </div>

            <div class="register-card fade-in">
                <h2>CREATE YOUR CHARACTER</h2>

                <div id="alertBox"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
                </form>

                <div class="register-footer">
                    Already a player? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';

        // Create particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            const colors = ['var(--primary)', 'var(--success)', 'var(--secondary)'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particlesContainer.appendChild(particle);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                document.getElementById('alertBox').innerHTML =
                    '<div class="alert alert-error">Passwords do not match</div>';
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Creating...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('alertBox').innerHTML =
                        '<div class="alert alert-success">Account created! Redirecting to login...</div>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    document.getElementById('alertBox').innerHTML =
                        `<div class="alert alert-error">${data.message}</div>`;
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('alertBox').innerHTML =
                    '<div class="alert alert-error">Cannot connect to server</div>';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
