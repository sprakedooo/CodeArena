<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .register-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .register-container {
            width: 100%;
            max-width: 420px;
        }

        .register-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-hero .hero-logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .register-hero .hero-logo .code { color: var(--primary); }
        .register-hero .hero-logo .arena { color: var(--success); }
        .register-hero .hero-logo .brackets { color: var(--text-muted); }

        .register-hero .hero-tagline {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .register-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary), var(--primary), var(--success));
        }

        .register-card h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            color: var(--text);
            margin-bottom: 1.5rem;
            text-align: center;
            letter-spacing: 1px;
        }

        .register-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .register-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles-bg" id="particles"></div>

    <div class="register-page">
        <div class="register-container">
            <div class="register-hero">
                <div class="hero-logo">
                    <img src="../assets/codearena-logo.png" alt="CodeArena" style="height:140px;width:auto;object-fit:contain;">
                </div>
                <div class="hero-tagline">Join The Adventure</div>
            </div>

            <div class="register-card fade-in">
                <h2>CREATE YOUR CHARACTER</h2>

                <div id="alertBox"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select id="role" class="form-input" onchange="toggleFacultyCode(this.value)">
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                        </select>
                    </div>
                    <div class="form-group" id="facultyCodeGroup" style="display:none;">
                        <label class="form-label">Faculty Registration Code</label>
                        <input type="text" id="facultyCode" class="form-input" placeholder="Enter faculty code">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
                </form>

                <!-- ── Divider ── -->
                <div style="display:flex;align-items:center;gap:12px;margin:20px 0 4px;">
                    <div style="flex:1;height:1px;background:var(--border);"></div>
                    <span style="font-size:0.75rem;color:var(--text-muted);">or</span>
                    <div style="flex:1;height:1px;background:var(--border);"></div>
                </div>

                <!-- ── Google OAuth button ── -->
                <a id="google-oauth-btn" href="#"
                   onclick="this.href=`http://${window.location.hostname}:3000/api/auth/google`"
                   style="display:flex;align-items:center;justify-content:center;gap:10px;
                          width:100%;padding:11px 0;border-radius:8px;
                          border:1px solid var(--border);background:var(--bg-surface);
                          color:var(--text);font-size:0.9rem;font-weight:500;
                          text-decoration:none;transition:border-color 0.2s,background 0.2s;
                          margin-bottom:20px;"
                   onmouseover="this.style.borderColor='#4285F4';this.style.background='var(--bg-card)';"
                   onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--bg-surface)';">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                    Sign up with Google
                </a>

                <div class="register-footer">
                    Already a player? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = `http://${window.location.hostname}:3000/api`;

        // Create particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            const colors = ['var(--primary)', 'var(--success)', 'var(--secondary)'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particlesContainer.appendChild(particle);
        }

        function toggleFacultyCode(role) {
            document.getElementById('facultyCodeGroup').style.display =
                role === 'faculty' ? 'block' : 'none';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const facultyCode = document.getElementById('facultyCode').value;

            if (password !== confirmPassword) {
                document.getElementById('alertBox').innerHTML =
                    '<div class="alert alert-error">Passwords do not match</div>';
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Creating...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, role, facultyCode })
                });
                const data = await res.json();

                if (data.success && data.needsVerification) {
                    // OTP sent — redirect to verify page
                    document.getElementById('alertBox').innerHTML =
                        '<div class="alert alert-success">Verification code sent! Check your email.</div>';
                    setTimeout(() => {
                        window.location.href = `verify-email.html?email=${encodeURIComponent(data.email)}`;
                    }, 1000);
                } else if (data.success) {
                    // Fallback: direct registration (should not happen now)
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('isLoggedIn', 'true');
                    setTimeout(() => {
                        if (data.user.role === 'faculty') {
                            window.location.href = 'faculty_dashboard.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1200);
                } else {
                    document.getElementById('alertBox').innerHTML =
                        `<div class="alert alert-error">${data.message}</div>`;
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            } catch (err) {
                document.getElementById('alertBox').innerHTML =
                    '<div class="alert alert-error">Cannot connect to server</div>';
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
