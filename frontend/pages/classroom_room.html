<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom — CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        /* ── Navbar ── */
        .navbar { padding: 0 18%; }

        /* ── Page ── */
        .room-page { padding: 40px 18%; min-height: calc(100vh - 64px); }

        /* ── Classroom header ── */
        .room-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
        }
        .room-header-left h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 1rem;
            color: var(--text);
            margin: 0 0 6px;
        }
        .room-header-left p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 0;
        }
        .room-teacher-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
        }

        /* ── Sub-tabs ── */
        .tab-nav {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
        }
        .tab-btn {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 20px;
            margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Lesson cards ── */
        .lesson-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .lesson-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s;
        }
        .lesson-card:hover { border-color: var(--primary); }
        .lesson-card-lang {
            font-size: 0.68rem;
            color: var(--secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .lesson-card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
        }
        .lesson-card-body {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .lesson-read-btn {
            align-self: flex-start;
            font-size: 0.78rem;
        }

        /* ── Lesson reader overlay ── */
        .reader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.75);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .reader-overlay.open { opacity: 1; pointer-events: all; }
        .reader-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(16px);
            transition: transform 0.2s;
        }
        .reader-overlay.open .reader-box { transform: translateY(0); }
        .reader-lang {
            font-size: 0.68rem;
            color: var(--secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .reader-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.85rem;
            color: var(--text);
            margin: 0 0 20px;
        }
        .reader-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .reader-content pre, .reader-content code {
            background: var(--bg-surface);
            border-radius: 6px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .reader-content pre { padding: 14px; display: block; overflow-x: auto; }
        .reader-close {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* ── Sessions ── */
        .session-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }
        .session-info { flex: 1; }
        .session-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .session-meta { font-size: 0.78rem; color: var(--text-secondary); margin-top: 3px; }
        .status-pill {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .status-pill.pending { background: rgba(245,158,11,.15); color: var(--warning); }
        .status-pill.active  { background: rgba(16,185,129,.15);  color: var(--success); }
        .status-pill.closed  { background: var(--bg-surface); color: var(--text-muted); }

        /* ── Quiz overlay ── */
        .quiz-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .quiz-overlay.open { opacity: 1; pointer-events: all; }
        .quiz-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 600px;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .quiz-progress {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .quiz-question {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .quiz-option {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--text);
            text-align: left;
            transition: border-color 0.15s, background 0.15s;
        }
        .quiz-option:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
        .quiz-option.correct { border-color: var(--success); background: rgba(16,185,129,.15); color: var(--success); }
        .quiz-option.wrong   { border-color: var(--danger);  background: rgba(239,68,68,.1);   color: var(--danger); }
        .quiz-option:disabled { cursor: default; }
        .quiz-hint { font-size: 0.8rem; color: var(--warning); background: rgba(245,158,11,.1); border-radius: 6px; padding: 10px 14px; }
        .quiz-score { font-family: 'Press Start 2P', monospace; font-size: 0.7rem; color: var(--xp-gold); }
        .fill-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 12px;
        }
        .fill-input:focus { outline: none; border-color: var(--primary); }

        /* ── Leaderboard ── */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lb-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .lb-rank {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            width: 28px;
            flex-shrink: 0;
            text-align: center;
        }
        .lb-rank.gold   { color: #fbbf24; }
        .lb-rank.silver { color: #94a3b8; }
        .lb-rank.bronze { color: #b45309; }
        .lb-name { flex: 1; font-weight: 600; color: var(--text); }
        .lb-score { font-family: 'Press Start 2P', monospace; font-size: 0.7rem; color: var(--xp-gold); }

        /* ── Live badge ── */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(239,68,68,.15);
            color: var(--danger);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 10px;
            text-transform: uppercase;
        }
        .live-dot {
            width: 7px;
            height: 7px;
            background: var(--danger);
            border-radius: 50%;
            animation: livePulse 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: .4; transform: scale(.7); }
        }
        .session-card.is-live {
            border-color: rgba(239,68,68,.4);
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(239,68,68,.04) 100%);
        }

        /* ── Play tab notification dot ── */
        .tab-btn .notif-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
            animation: livePulse 1.2s ease-in-out infinite;
        }

        /* ── Live toast ── */
        .live-toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--bg-card);
            border: 1px solid rgba(239,68,68,.4);
            border-radius: 12px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 800;
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
            transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
            min-width: 280px;
            cursor: pointer;
        }
        .live-toast.show { transform: translateX(-50%) translateY(0); }
        .live-toast-icon { font-size: 1.4rem; }
        .live-toast-text strong { color: var(--danger); display: block; font-size: 0.85rem; }
        .live-toast-text span { color: var(--text-secondary); font-size: 0.78rem; }
        .live-toast-cta {
            margin-left: auto;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        /* ── Results screen ── */
        .results-box {
            text-align: center;
            padding: 20px 0;
        }
        .results-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 8px;
        }
        .results-score {
            font-family: 'Press Start 2P', monospace;
            font-size: 2rem;
            color: var(--xp-gold);
            margin: 16px 0;
        }
        .results-sub { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }

        /* ── Feedback tab ── */
        .feedback-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .feedback-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .feedback-card-title {
            font-size: 0.72rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .assessment-text {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.7;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            margin-top: 4px;
        }
        .stat-item { text-align: center; }
        .stat-val {
            font-family: 'Press Start 2P', monospace;
            font-size: 1rem;
            color: var(--xp-gold);
            display: block;
            margin-bottom: 4px;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); }
        .area-pills { display: flex; flex-wrap: wrap; gap: 8px; }
        .area-pill {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .area-pill.weak   { background: rgba(239,68,68,.15);  color: var(--danger);  border: 1px solid rgba(239,68,68,.3); }
        .area-pill.strong { background: rgba(16,185,129,.15); color: var(--success); border: 1px solid rgba(16,185,129,.3); }
        .reco-list { list-style: none; padding: 0; margin: 0; }
        .reco-list li {
            font-size: 0.82rem;
            color: var(--text-secondary);
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            line-height: 1.5;
        }
        .reco-list li:last-child { border-bottom: none; }
        .reco-list li::before { content: '→ '; color: var(--primary); font-weight: 700; }
        @media (max-width: 700px) { .feedback-grid { grid-template-columns: 1fr; } }

        /* ── Empty / loading ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .loading-text {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .navbar    { padding: 0 5%; }
            .room-page { padding: 24px 5%; }
            .room-header { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
    <span class="navbar-brand logo">
        <span class="logo-bracket">&lt;</span><span class="logo-code">Code</span><span class="logo-arena">Arena</span><span class="logo-bracket">/&gt;</span>
    </span>
    <ul class="navbar-nav">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="lessons.html">Lessons</a></li>
        <li><a href="lesson_game.html">Play</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
</nav>

<main class="room-page">

    <!-- ── Room header ── -->
    <div class="room-header">
        <div class="room-header-left">
            <h1 id="roomName">Loading…</h1>
            <p id="roomDesc">—</p>
        </div>
        <div class="room-teacher-badge" id="roomTeacher">👨‍🏫 —</div>
    </div>

    <!-- ── Sub-tabs ── -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('lessons', this)">📚 Lessons</button>
        <button class="tab-btn" onclick="switchTab('play', this)">🎮 Play</button>
        <button class="tab-btn" onclick="switchTab('leaderboard', this)">🏆 Leaderboard</button>
        <button class="tab-btn" onclick="switchTab('feedback', this)">📊 Feedback</button>
    </div>

    <!-- ── TAB: LESSONS ── -->
    <div class="tab-panel active" id="tab-lessons">
        <div class="lesson-cards" id="lessonsGrid">
            <div class="loading-text">Loading lessons…</div>
        </div>
    </div>

    <!-- ── TAB: PLAY ── -->
    <div class="tab-panel" id="tab-play">
        <div id="sessionsContainer">
            <div class="loading-text">Loading sessions…</div>
        </div>
    </div>

    <!-- ── TAB: LEADERBOARD ── -->
    <div class="tab-panel" id="tab-leaderboard">
        <div class="leaderboard-list" id="leaderboardList">
            <div class="loading-text">Loading leaderboard…</div>
        </div>
    </div>

    <!-- ── TAB: FEEDBACK ── -->
    <div class="tab-panel" id="tab-feedback">
        <div id="feedbackContainer">
            <div class="loading-text">Loading your feedback…</div>
        </div>
    </div>

</main>

<!-- ── Live Session Toast ── -->
<div class="live-toast" id="liveToast" onclick="goToPlayTab()">
    <div class="live-toast-icon">🔴</div>
    <div class="live-toast-text">
        <strong>Session is LIVE!</strong>
        <span id="liveToastTitle">Your teacher started a session</span>
    </div>
    <button class="live-toast-cta">Play Now →</button>
</div>

<!-- ── Lesson Reader ── -->
<div class="reader-overlay" id="readerOverlay" onclick="handleReaderOverlay(event)">
    <div class="reader-box">
        <div class="reader-lang" id="readerLang"></div>
        <div class="reader-title" id="readerTitle"></div>
        <div class="reader-content" id="readerContent"></div>
        <div class="reader-close">
            <button class="btn btn-outline" onclick="closeReader()">Close</button>
        </div>
    </div>
</div>

<!-- ── Quiz Overlay ── -->
<div class="quiz-overlay" id="quizOverlay">
    <div class="quiz-box">
        <div class="quiz-header">
            <div>
                <div id="quizSessionTitle" style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:4px;"></div>
                <div class="quiz-progress" id="quizProgress">Question 1 of —</div>
            </div>
            <div class="quiz-score" id="quizScore">0 pts</div>
        </div>
        <div class="quiz-question" id="quizQuestion">—</div>
        <div id="quizBody"><!-- options or fill input rendered here --></div>
        <div class="quiz-hint" id="quizHint" style="display:none;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;">
            <button class="btn btn-outline" onclick="exitQuiz()">✕ Exit</button>
            <button class="btn btn-primary" id="quizNextBtn" onclick="nextQuestion()" style="display:none;">Next →</button>
        </div>
    </div>
</div>

<script>
    const API = 'http://localhost:3000/api';
    const params = new URLSearchParams(window.location.search);
    const classroomId = params.get('id');

    const user = JSON.parse(localStorage.getItem('user') || 'null');
    const token = localStorage.getItem('token');
    if (!user || !token) { window.location.href = 'login.html'; }
    if (!classroomId) { window.location.href = 'dashboard.html'; }

    function getAuthHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }
    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function relativeTime(iso) {
        if (!iso) return '—';
        const diff = Date.now() - new Date(iso).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 1) return 'Just now';
        if (m < 60) return `${m}m ago`;
        const h = Math.floor(m / 60);
        if (h < 24) return `${h}h ago`;
        return `${Math.floor(h/24)}d ago`;
    }

    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        if (id === 'leaderboard') loadLeaderboard();
        if (id === 'feedback')    loadFeedback();
        if (id === 'play') clearPlayNotifDot();
    }

    function goToPlayTab() {
        hideLiveToast();
        const playBtn = document.querySelector('.tab-btn[onclick*="play"]');
        switchTab('play', playBtn);
    }

    // ── Classroom info ────────────────────────────────────────────────────────
    async function loadClassroom() {
        try {
            const res = await fetch(`${API}/classrooms/${classroomId}`, { headers: getAuthHeaders() });
            const data = await res.json();
            if (!data.success) throw new Error(data.message);
            const c = data.classroom;
            document.getElementById('roomName').textContent = c.name;
            document.getElementById('roomDesc').textContent = c.description || c.subject || 'No description';
            document.getElementById('roomTeacher').textContent = '👨‍🏫 ' + (c.facultyName || c.faculty_name || 'Your Teacher');
            document.title = c.name + ' — CodeArena';
        } catch (err) {
            document.getElementById('roomName').textContent = 'Classroom not found';
        }
    }

    // ── Lessons ───────────────────────────────────────────────────────────────
    async function loadLessons() {
        try {
            const res = await fetch(`${API}/classrooms/${classroomId}/lessons`, { headers: getAuthHeaders() });
            const data = await res.json();
            const lessons = data.success ? (data.lessons || []) : [];
            const grid = document.getElementById('lessonsGrid');
            if (!lessons.length) {
                grid.innerHTML = `<div class="empty-state">No lessons posted yet. Check back later!</div>`;
                return;
            }
            grid.innerHTML = lessons.map(l => `
                <div class="lesson-card">
                    <div class="lesson-card-lang">${escHtml(l.language || 'General')}</div>
                    <div class="lesson-card-title">${escHtml(l.title)}</div>
                    <div class="lesson-card-body">${escHtml((l.content || '').replace(/<[^>]+>/g, '')).substring(0, 120)}…</div>
                    <button class="btn btn-outline lesson-read-btn" onclick="openReader(${JSON.stringify(l).replace(/"/g,'&quot;')})">Read Lesson →</button>
                </div>`).join('');
        } catch (err) {
            document.getElementById('lessonsGrid').innerHTML = `<div class="empty-state">Failed to load lessons.</div>`;
        }
    }

    function openReader(lesson) {
        document.getElementById('readerLang').textContent = lesson.language || 'General';
        document.getElementById('readerTitle').textContent = lesson.title;
        document.getElementById('readerContent').innerHTML = lesson.content || '';
        document.getElementById('readerOverlay').classList.add('open');
    }
    function closeReader() { document.getElementById('readerOverlay').classList.remove('open'); }
    function handleReaderOverlay(e) { if (e.target === document.getElementById('readerOverlay')) closeReader(); }

    // ── Live polling ──────────────────────────────────────────────────────────
    let pollTimer = null;
    let knownStates = {};   // sessionId → status
    let toastTimer = null;
    let isQuizOpen = false;

    function startPolling() {
        if (pollTimer) return;
        pollTimer = setInterval(pollSessions, 5000);
    }
    function stopPolling() {
        clearInterval(pollTimer);
        pollTimer = null;
    }

    async function pollSessions() {
        if (isQuizOpen) return; // don't refresh while student is mid-quiz
        try {
            const res = await fetch(`${API}/classrooms/${classroomId}/sessions`, { headers: getAuthHeaders() });
            const data = await res.json();
            const sessions = data.success ? (data.sessions || []) : [];

            let hasActive = false;
            sessions.forEach(s => {
                const id = s.session_id || s.id;
                const prev = knownStates[id];
                const curr = s.status;

                // Detect pending → active (teacher just launched)
                if (prev === 'pending' && curr === 'active') {
                    showLiveToast(s.title);
                    setPlayNotifDot();
                }
                // Detect active → closed (teacher ended session during quiz)
                if (prev === 'active' && curr === 'closed' && isQuizOpen && activeSessionId === id) {
                    exitQuiz(false, true); // force-exit
                }

                knownStates[id] = curr;
                if (curr === 'active') hasActive = true;
            });

            // Re-render sessions list silently (no loading flash)
            renderSessions(sessions);

            // Update leaderboard tab if it's open
            if (document.getElementById('tab-leaderboard').classList.contains('active')) {
                loadLeaderboard();
            }

            // Manage notif dot
            if (hasActive) setPlayNotifDot();
            else clearPlayNotifDot();

        } catch (_) {}
    }

    function showLiveToast(title) {
        document.getElementById('liveToastTitle').textContent = title || 'Your teacher started a session';
        const toast = document.getElementById('liveToast');
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(hideLiveToast, 8000);
    }
    function hideLiveToast() {
        document.getElementById('liveToast').classList.remove('show');
    }

    function setPlayNotifDot() {
        const btn = document.querySelector('.tab-btn[onclick*="play"]');
        if (btn && !btn.querySelector('.notif-dot')) {
            const dot = document.createElement('span');
            dot.className = 'notif-dot';
            btn.appendChild(dot);
        }
    }
    function clearPlayNotifDot() {
        document.querySelector('.tab-btn .notif-dot')?.remove();
    }

    // ── Sessions / Play ───────────────────────────────────────────────────────
    let sessionQuestions = [];
    let currentQIdx = 0;
    let quizScore = 0;
    let activeSessionId = null;
    let answered = false;

    async function loadSessions() {
        try {
            const res = await fetch(`${API}/classrooms/${classroomId}/sessions`, { headers: getAuthHeaders() });
            const data = await res.json();
            const sessions = data.success ? (data.sessions || []) : [];
            // Seed known states on first load (no toast)
            sessions.forEach(s => { knownStates[s.session_id || s.id] = s.status; });
            renderSessions(sessions);
        } catch (err) {
            document.getElementById('sessionsContainer').innerHTML = `<div class="empty-state">Failed to load sessions.</div>`;
        }
    }

    function renderSessions(sessions) {
        const container = document.getElementById('sessionsContainer');
        if (!sessions.length) {
            container.innerHTML = `<div class="empty-state">No sessions yet. Your teacher will create one soon!</div>`;
            return;
        }
        container.innerHTML = sessions.map(s => {
            const sid = s.session_id || s.id;
            const isLive = s.status === 'active';
            return `
            <div class="session-card${isLive ? ' is-live' : ''}">
                <div class="session-info">
                    <div class="session-title">${escHtml(s.title)}</div>
                    <div class="session-meta">Mode: ${s.game_mode || 'mcq'} · ${relativeTime(s.created_at || s.createdAt)}</div>
                </div>
                ${isLive
                    ? `<span class="live-badge"><span class="live-dot"></span>LIVE</span>
                       <button class="btn btn-primary" style="font-size:0.8rem;" onclick="startSession(${sid},'${escHtml(s.title)}','${s.game_mode||'mcq'}')">▶ Play</button>`
                    : `<span class="status-pill ${s.status}">${s.status === 'closed' ? 'Ended' : 'Waiting'}</span>`
                }
            </div>`;
        }).join('');
    }

    async function startSession(sessionId, title, mode) {
        activeSessionId = sessionId;
        quizScore = 0;
        currentQIdx = 0;
        answered = false;
        isQuizOpen = true;
        stopPolling(); // pause polling while playing
        document.getElementById('quizSessionTitle').textContent = title;
        document.getElementById('quizScore').textContent = '0 pts';

        try {
            const res = await fetch(`${API}/classrooms/${classroomId}/sessions`, { headers: getAuthHeaders() });
            const data = await res.json();
            const session = (data.sessions || []).find(s => (s.session_id || s.id) === sessionId);
            if (!session) throw new Error('Session not found');

            const qRes = await fetch(`${API}/classrooms/${classroomId}/questions`, { headers: getAuthHeaders() });
            const qData = await qRes.json();
            const allQ = qData.success ? (qData.questions || []) : [];
            const ids = session.question_ids || [];
            sessionQuestions = ids.length
                ? allQ.filter(q => ids.includes(q.question_id || q.id))
                : allQ;

            if (!sessionQuestions.length) {
                alert('This session has no questions yet.');
                isQuizOpen = false;
                startPolling();
                return;
            }

            document.getElementById('quizOverlay').classList.add('open');
            renderQuestion();
        } catch (err) {
            alert('Failed to load session: ' + err.message);
            isQuizOpen = false;
            startPolling();
        }
    }

    function renderQuestion() {
        const q = sessionQuestions[currentQIdx];
        answered = false;
        document.getElementById('quizProgress').textContent = `Question ${currentQIdx + 1} of ${sessionQuestions.length}`;
        document.getElementById('quizQuestion').textContent = q.question_text || q.questionText || '';
        document.getElementById('quizHint').style.display = 'none';
        document.getElementById('quizNextBtn').style.display = 'none';

        const type = q.type || 'mcq';
        const body = document.getElementById('quizBody');

        if (type === 'mcq') {
            const options = Array.isArray(q.options) ? q.options : [];
            body.innerHTML = `<div class="quiz-options">${options.map((opt, i) => `
                <button class="quiz-option" onclick="submitAnswer('${escHtml(String.fromCharCode(65+i))}', this)">${escHtml(opt)}</button>
            `).join('')}</div>`;
        } else {
            body.innerHTML = `
                <input type="text" class="fill-input" id="fillAnswer" placeholder="Type your answer…">
                <button class="btn btn-primary" onclick="submitFillAnswer()" style="width:100%;">Submit Answer</button>`;
        }
    }

    async function submitAnswer(selected, btn) {
        if (answered) return;
        answered = true;
        const q = sessionQuestions[currentQIdx];
        const correct = (q.correct_answer || q.correctAnswer || '').trim().toUpperCase();
        const isCorrect = selected.toUpperCase() === correct;

        document.querySelectorAll('.quiz-option').forEach(b => {
            b.disabled = true;
            const letter = String.fromCharCode(65 + [...document.querySelectorAll('.quiz-option')].indexOf(b));
            if (letter === correct) b.classList.add('correct');
        });
        if (!isCorrect) {
            btn.classList.add('wrong');
            if (q.hint) {
                document.getElementById('quizHint').textContent = '💡 ' + q.hint;
                document.getElementById('quizHint').style.display = 'block';
            }
        } else {
            quizScore += q.points || 10;
            document.getElementById('quizScore').textContent = quizScore + ' pts';
        }
        await recordAnswer(q, selected, isCorrect);
        document.getElementById('quizNextBtn').style.display = 'block';
    }

    async function submitFillAnswer() {
        if (answered) return;
        const val = (document.getElementById('fillAnswer')?.value || '').trim();
        if (!val) return;
        answered = true;
        const q = sessionQuestions[currentQIdx];
        const correct = (q.correct_answer || q.correctAnswer || '').trim();
        const isCorrect = val.toLowerCase() === correct.toLowerCase();

        document.getElementById('fillAnswer').disabled = true;
        document.querySelector('#quizBody button')?.setAttribute('disabled','true');

        if (isCorrect) {
            document.getElementById('fillAnswer').style.borderColor = 'var(--success)';
            quizScore += q.points || 10;
            document.getElementById('quizScore').textContent = quizScore + ' pts';
        } else {
            document.getElementById('fillAnswer').style.borderColor = 'var(--danger)';
            if (q.hint) {
                document.getElementById('quizHint').textContent = '💡 ' + q.hint;
                document.getElementById('quizHint').style.display = 'block';
            }
        }
        await recordAnswer(q, val, isCorrect);
        document.getElementById('quizNextBtn').style.display = 'block';
    }

    async function recordAnswer(q, answer, isCorrect) {
        try {
            await fetch(`${API}/classrooms/${classroomId}/sessions/${activeSessionId}/answer`, {
                method: 'POST', headers: getAuthHeaders(),
                body: JSON.stringify({
                    question_id: q.question_id || q.id,
                    answer: String(answer),
                    is_correct: isCorrect,
                    points_earned: isCorrect ? (q.points || 10) : 0
                })
            });
        } catch (_) {}
    }

    function nextQuestion() {
        currentQIdx++;
        if (currentQIdx >= sessionQuestions.length) {
            showResults();
            return;
        }
        renderQuestion();
    }

    function showResults() {
        const total = sessionQuestions.length;
        const correct = sessionQuestions.filter((_, i) => i < currentQIdx).length; // rough
        document.getElementById('quizQuestion').style.display = 'none';
        document.getElementById('quizBody').innerHTML = `
            <div class="results-box">
                <div class="results-title">🎉 Session Complete!</div>
                <div class="results-score">${quizScore} pts</div>
                <div class="results-sub">You finished all ${total} questions.</div>
                <button class="btn btn-primary" style="margin:0 auto;" onclick="exitQuiz(true)">See Leaderboard</button>
            </div>`;
        document.getElementById('quizHint').style.display = 'none';
        document.getElementById('quizNextBtn').style.display = 'none';
    }

    function exitQuiz(finished = false, forced = false) {
        isQuizOpen = false;
        document.getElementById('quizOverlay').classList.remove('open');
        document.getElementById('quizQuestion').style.display = '';
        activeSessionId = null;
        startPolling(); // resume polling
        if (forced) {
            setTimeout(() => alert('The teacher has ended this session.'), 150);
        }
        if (finished) {
            const playBtn = document.querySelector('.tab-btn[onclick*="leaderboard"]');
            switchTab('leaderboard', playBtn);
        } else {
            loadSessions();
        }
    }

    // ── Leaderboard ───────────────────────────────────────────────────────────
    async function loadLeaderboard() {
        try {
            const res = await fetch(`${API}/classrooms/${classroomId}/leaderboard`, { headers: getAuthHeaders() });
            const data = await res.json();
            const board = data.success ? (data.leaderboard || []) : [];
            const list = document.getElementById('leaderboardList');
            if (!board.length) {
                list.innerHTML = `<div class="empty-state">No scores yet. Be the first to play!</div>`;
                return;
            }
            const rankClasses = ['gold', 'silver', 'bronze'];
            list.innerHTML = board.map((entry, i) => `
                <div class="lb-row" ${entry.student_id === user.id ? 'style="border-color:var(--primary);"' : ''}>
                    <div class="lb-rank ${rankClasses[i] || ''}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i+1)}</div>
                    <div class="lb-name">${escHtml(entry.fullName || entry.full_name || 'Student')}${entry.student_id === user.id ? ' <span style="color:var(--primary);font-size:0.7rem;">(You)</span>' : ''}</div>
                    <div class="lb-score">${entry.totalPoints || entry.total_points || 0} pts</div>
                </div>`).join('');
        } catch (err) {
            document.getElementById('leaderboardList').innerHTML = `<div class="empty-state">Failed to load leaderboard.</div>`;
        }
    }

    // ── Feedback ──────────────────────────────────────────────────────────────
    let feedbackLoaded = false;
    async function loadFeedback() {
        if (feedbackLoaded) return; // only fetch once per page load
        const container = document.getElementById('feedbackContainer');
        container.innerHTML = '<div class="loading-text">Analyzing your performance…</div>';
        try {
            const res = await fetch(`${API}/classrooms/${classroomId}/feedback`, { headers: getAuthHeaders() });
            const data = await res.json();
            if (!data.success) throw new Error(data.message || 'No feedback available yet');
            feedbackLoaded = true;
            renderFeedback(data);
        } catch (err) {
            container.innerHTML = `<div class="empty-state">📊 ${escHtml(err.message)}<br><br>
                <small style="color:var(--text-muted);">Complete some session challenges first to get personalized feedback.</small></div>`;
        }
    }

    function renderFeedback(data) {
        const container = document.getElementById('feedbackContainer');
        const { overallAssessment, weakAreas = [], strongAreas = [], recommendations = [], stats = {} } = data;

        const accuracyPct = stats.accuracy != null ? Math.round(stats.accuracy) : '—';
        const total    = stats.totalAnswered ?? '—';
        const correct  = stats.correctAnswers ?? '—';

        const weakPills   = weakAreas.length
            ? weakAreas.map(t => `<span class="area-pill weak">⚠ ${escHtml(t)}</span>`).join('')
            : `<span style="color:var(--text-muted);font-size:0.8rem;">None identified — great work!</span>`;

        const strongPills = strongAreas.length
            ? strongAreas.map(t => `<span class="area-pill strong">✓ ${escHtml(t)}</span>`).join('')
            : `<span style="color:var(--text-muted);font-size:0.8rem;">Keep practicing to unlock strength areas.</span>`;

        const recoItems = recommendations.length
            ? recommendations.map(r => `<li>${escHtml(r)}</li>`).join('')
            : `<li>Complete more sessions to receive personalised recommendations.</li>`;

        container.innerHTML = `
            <div class="feedback-grid">
                <!-- Overall assessment -->
                <div class="feedback-card" style="grid-column:1/-1;">
                    <div class="feedback-card-title">🤖 AI Assessment</div>
                    <div class="assessment-text">${escHtml(overallAssessment || 'No assessment yet.')}</div>
                </div>

                <!-- Stats -->
                <div class="feedback-card">
                    <div class="feedback-card-title">📈 Your Stats</div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <span class="stat-val">${accuracyPct}${accuracyPct !== '—' ? '%' : ''}</span>
                            <span class="stat-label">Accuracy</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-val">${correct}</span>
                            <span class="stat-label">Correct</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-val">${total}</span>
                            <span class="stat-label">Answered</span>
                        </div>
                    </div>
                </div>

                <!-- Recommendations -->
                <div class="feedback-card">
                    <div class="feedback-card-title">💡 Recommendations</div>
                    <ul class="reco-list">${recoItems}</ul>
                </div>

                <!-- Weak areas -->
                <div class="feedback-card">
                    <div class="feedback-card-title">⚠ Areas to Improve</div>
                    <div class="area-pills">${weakPills}</div>
                </div>

                <!-- Strong areas -->
                <div class="feedback-card">
                    <div class="feedback-card-title">✓ Strong Areas</div>
                    <div class="area-pills">${strongPills}</div>
                </div>
            </div>
            <div style="text-align:center;margin-top:8px;">
                <button class="btn btn-outline" style="font-size:0.78rem;" onclick="refreshFeedback()">↻ Refresh Feedback</button>
            </div>`;
    }

    function refreshFeedback() {
        feedbackLoaded = false;
        loadFeedback();
    }

    // ── Logout ────────────────────────────────────────────────────────────────
    function logout() {
        if (!confirm('Logout?')) return;
        stopPolling();
        localStorage.removeItem('user');
        localStorage.removeItem('token');
        localStorage.removeItem('isLoggedIn');
        window.location.href = 'index.html';
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadClassroom();
    loadLessons();
    loadSessions().then(() => startPolling());
</script>
</body>
</html>
