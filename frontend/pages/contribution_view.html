<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn – CodeArena</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        .view-wrap { max-width: 780px; margin: 0 auto; }

        /* ── Back link ─────────────────────────────────────────────────────── */
        .back-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.8rem; color: var(--text-muted); text-decoration: none;
            margin-bottom: 1.4rem; transition: color 0.15s;
        }
        .back-link:hover { color: var(--primary); }
        .back-link .material-symbols-outlined { font-size: 1rem; }

        /* ── Header ────────────────────────────────────────────────────────── */
        .view-header {
            background: linear-gradient(135deg, #1e1045 0%, #12203a 100%);
            border: 1px solid rgba(124,58,237,0.2);
            border-radius: var(--radius-lg); padding: 2rem;
            margin-bottom: 1.75rem; position: relative; overflow: hidden;
        }
        .view-header::before {
            content:''; position:absolute; inset:0; pointer-events:none;
            background: radial-gradient(ellipse at top right,rgba(124,58,237,.18),transparent 60%),
                        radial-gradient(ellipse at bottom left,rgba(6,182,212,.08),transparent 60%);
        }
        .view-type-badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; padding: 0.22rem 0.65rem; border-radius: 20px;
            margin-bottom: 0.85rem; position: relative;
        }
        .view-type-badge.blog   { background: rgba(6,182,212,0.15); color:#22d3ee; border:1px solid rgba(6,182,212,0.3); }
        .view-type-badge.course { background: rgba(124,58,237,0.15); color:#a78bfa; border:1px solid rgba(124,58,237,0.3); }
        .view-title {
            font-size: 1.55rem; font-weight: 800; color: #fff;
            line-height: 1.25; margin: 0 0 0.65rem; position: relative;
        }
        .view-meta {
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            font-size: 0.78rem; color: rgba(255,255,255,0.5); position: relative;
        }
        .view-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .view-meta .material-symbols-outlined { font-size: 0.9rem; }
        .view-author-avatar {
            width: 22px; height: 22px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .view-author-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        /* ── Blog / section content ────────────────────────────────────────── */
        .blog-body {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 2rem;
        }
        .blog-body p, .course-section-body p {
            font-size: 0.92rem; color: var(--text-secondary);
            line-height: 1.75; margin: 0 0 1rem;
        }
        .blog-section-head {
            font-size: 1rem; font-weight: 700; color: var(--text);
            margin: 1.5rem 0 0.6rem; padding-bottom: 0.35rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── Code block ────────────────────────────────────────────────────── */
        .code-block {
            background: #0d1117; border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius); overflow: hidden; margin: 1.25rem 0;
        }
        .code-block-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.45rem 1rem; background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .code-lang-label {
            font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .code-copy-btn {
            display: inline-flex; align-items: center; gap: 0.25rem;
            font-size: 0.7rem; font-weight: 600; padding: 0.22rem 0.6rem;
            border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: all 0.15s; background: transparent;
            color: var(--text-muted);
        }
        .code-copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }
        .code-copy-btn .material-symbols-outlined { font-size: 0.82rem; }
        .code-block pre { margin: 0; padding: 1rem; overflow-x: auto; }
        .code-block pre code { font-size: 0.82rem; font-family: 'Fira Code', 'Cascadia Code', monospace; }

        /* ── Code CTA strip (below code) ──────────────────────────────────── */
        .code-cta-bar {
            display: flex; gap: 0; border-top: 1px solid rgba(255,255,255,0.07);
        }
        .cta-btn {
            flex: 1; display: flex; align-items: center; justify-content: center;
            gap: 0.45rem; padding: 0.65rem 0.5rem;
            font-size: 0.8rem; font-weight: 700; font-family: inherit;
            border: none; cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px;
        }
        .cta-btn .material-symbols-outlined { font-size: 1.05rem; }
        .cta-try {
            background: rgba(124,58,237,0.15); color: #c4b5fd;
            border-right: 1px solid rgba(255,255,255,0.07);
        }
        .cta-try:hover {
            background: rgba(124,58,237,0.28); color: #ddd6fe;
            box-shadow: inset 0 0 20px rgba(124,58,237,0.15);
        }
        .cta-ai {
            background: rgba(6,182,212,0.12); color: #67e8f9;
        }
        .cta-ai:hover {
            background: rgba(6,182,212,0.24); color: #a5f3fc;
            box-shadow: inset 0 0 20px rgba(6,182,212,0.12);
        }

        /* ── AI Chat Panel ─────────────────────────────────────────────────── */
        .ai-panel-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.55);
            z-index: 5000; display: none; align-items: flex-end; justify-content: center;
            padding: 0 1rem 1.5rem;
        }
        .ai-panel-overlay.open { display: flex; }
        .ai-panel {
            width: 100%; max-width: 680px;
            background: var(--bg-card); border: 1px solid rgba(6,182,212,0.3);
            border-radius: var(--radius-lg); box-shadow: 0 -8px 48px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; max-height: 78vh;
            animation: panel-up 0.22s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes panel-up { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        .ai-panel-header {
            padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.65rem; flex-shrink: 0;
        }
        .ai-panel-icon {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(6,182,212,0.3), rgba(124,58,237,0.3));
            border: 1px solid rgba(6,182,212,0.4);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .ai-panel-icon .material-symbols-outlined { font-size: 1rem; color: #67e8f9; }
        .ai-panel-title { flex: 1; }
        .ai-panel-title strong { display: block; font-size: 0.9rem; color: var(--text); }
        .ai-panel-title span { font-size: 0.72rem; color: var(--text-muted); }
        .ai-panel-close {
            background: none; border: none; cursor: pointer; color: var(--text-muted);
            display: flex; border-radius: 6px; padding: 0.2rem; transition: color 0.15s;
        }
        .ai-panel-close:hover { color: var(--text); }

        /* Code context preview */
        .ai-code-ctx {
            margin: 0.75rem 1.2rem 0; padding: 0.6rem 0.85rem;
            background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm); flex-shrink: 0;
        }
        .ai-code-ctx-label { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
        .ai-code-ctx pre {
            margin: 0; font-size: 0.72rem; color: #94a3b8;
            font-family: 'Fira Code', monospace; white-space: pre-wrap;
            word-break: break-all; max-height: 80px; overflow: hidden;
            line-height: 1.5;
        }
        .ai-code-ctx-fade {
            position: relative; margin-top: -1.5rem; height: 1.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.35));
            pointer-events: none;
        }

        /* Messages */
        .ai-messages {
            flex: 1; overflow-y: auto; padding: 0.85rem 1.2rem;
            display: flex; flex-direction: column; gap: 0.75rem; min-height: 80px;
        }
        .ai-msg { display: flex; gap: 0.65rem; }
        .ai-msg.user { flex-direction: row-reverse; }
        .ai-msg-bubble {
            max-width: 78%; padding: 0.6rem 0.9rem;
            border-radius: 12px; font-size: 0.83rem; line-height: 1.6;
            white-space: pre-wrap; word-break: break-word;
        }
        .ai-msg.ai .ai-msg-bubble {
            background: rgba(255,255,255,0.05); color: var(--text);
            border: 1px solid rgba(255,255,255,0.07); border-radius: 4px 12px 12px 12px;
        }
        .ai-msg.user .ai-msg-bubble {
            background: rgba(124,58,237,0.18); color: #e9d5ff;
            border: 1px solid rgba(124,58,237,0.3); border-radius: 12px 4px 12px 12px;
        }
        .ai-avatar {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
        }
        .ai-avatar.bot {
            background: linear-gradient(135deg,rgba(6,182,212,0.3),rgba(124,58,237,0.3));
            border: 1px solid rgba(6,182,212,0.3);
        }
        .ai-avatar.bot .material-symbols-outlined { font-size: 0.9rem; color: #67e8f9; }
        .ai-avatar.user-av { background: rgba(124,58,237,0.25); border: 1px solid rgba(124,58,237,0.3); color: #c4b5fd; font-weight: 700; }

        /* Typing indicator */
        .ai-typing { display: flex; align-items: center; gap: 4px; padding: 0.4rem 0.2rem; }
        .ai-typing span {
            width: 6px; height: 6px; border-radius: 50%; background: #67e8f9;
            animation: ai-bounce 1.2s ease-in-out infinite;
        }
        .ai-typing span:nth-child(2) { animation-delay: 0.2s; }
        .ai-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes ai-bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1);opacity:1} }

        /* Input row */
        .ai-input-row {
            padding: 0.75rem 1.2rem; border-top: 1px solid var(--border);
            display: flex; gap: 0.6rem; align-items: flex-end; flex-shrink: 0;
        }
        .ai-input-row textarea {
            flex: 1; background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 0.55rem 0.8rem;
            color: var(--text); font-size: 0.85rem; font-family: inherit;
            resize: none; outline: none; line-height: 1.5; min-height: 38px; max-height: 120px;
            overflow-y: auto;
        }
        .ai-input-row textarea:focus { border-color: rgba(6,182,212,0.5); }
        .ai-send-btn {
            background: linear-gradient(135deg, #0891b2, #7c3aed);
            border: none; border-radius: var(--radius-sm);
            color: #fff; cursor: pointer; padding: 0.5rem 0.65rem;
            display: flex; align-items: center; transition: opacity 0.15s;
            flex-shrink: 0;
        }
        .ai-send-btn:hover { opacity: 0.88; }
        .ai-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .ai-send-btn .material-symbols-outlined { font-size: 1.1rem; }

        /* ── Course sections ───────────────────────────────────────────────── */
        .course-sections { display: flex; flex-direction: column; gap: 0.75rem; }
        .course-section {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); overflow: hidden;
        }
        .course-section-header {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 1rem 1.25rem; cursor: pointer;
            transition: background 0.15s; user-select: none;
        }
        .course-section-header:hover { background: rgba(255,255,255,0.03); }
        .course-section.open .course-section-header { border-bottom: 1px solid var(--border); }
        .section-num-badge {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            background: rgba(124,58,237,0.2); color: #a78bfa;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
        }
        .course-section.open .section-num-badge { background: var(--primary); color: #fff; }
        .section-header-title { flex: 1; font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .section-chevron { font-size: 1rem; color: var(--text-muted); transition: transform 0.2s; }
        .course-section.open .section-chevron { transform: rotate(180deg); }
        .course-section-body { display: none; padding: 1.25rem; }
        .course-section.open .course-section-body { display: block; }
        .course-section-body p:last-of-type { margin-bottom: 0; }

        /* ── Progress bar (course) ─────────────────────────────────────────── */
        .course-progress-bar-wrap {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 0.85rem 1.1rem;
            margin-bottom: 1.25rem; display: flex; align-items: center; gap: 1rem;
        }
        .course-progress-bar { flex: 1; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; }
        .course-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; transition: width 0.4s ease; }
        .course-progress-label { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }

        /* ── Tags ──────────────────────────────────────────────────────────── */
        .tag-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }
        .tag-pill {
            font-size: 0.68rem; font-weight: 600; padding: 0.18rem 0.55rem;
            border-radius: 20px; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); color: var(--text-muted);
        }

        /* ── Skeleton ──────────────────────────────────────────────────────── */
        .skel { background: var(--bg-surface); border-radius: 6px; animation: shimmer 1.4s infinite; }
        @keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }
    </style>
</head>

<!-- ── AI Chat Panel ───────────────────────────────────────────────────────── -->
<div class="ai-panel-overlay" id="aiOverlay" onclick="handleOverlayClick(event)">
    <div class="ai-panel" id="aiPanel">
        <div class="ai-panel-header">
            <div class="ai-panel-icon">
                <span class="material-symbols-outlined">auto_awesome</span>
            </div>
            <div class="ai-panel-title">
                <strong>AI Assistant</strong>
                <span>Ask anything about this code snippet</span>
            </div>
            <button class="ai-panel-close" onclick="closeAskAI()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="ai-code-ctx" id="aiCodeCtx" style="display:none;">
            <div class="ai-code-ctx-label">Code context</div>
            <pre id="aiCodePre"></pre>
            <div class="ai-code-ctx-fade"></div>
        </div>
        <div class="ai-messages" id="aiMessages"></div>
        <div class="ai-input-row">
            <textarea id="aiInput" rows="1" placeholder="Ask about this code… (Enter to send)"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAIMessage();}
                           this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';"></textarea>
            <button class="ai-send-btn" id="aiSendBtn" onclick="sendAIMessage()">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </div>
</div>

<div class="view-wrap">
    <a href="contribute.html" class="back-link">
        <span class="material-symbols-outlined">arrow_back</span>
        Back to My Contributions
    </a>

    <div id="viewHeader">
        <div class="skel" style="height:160px;border-radius:var(--radius-lg);margin-bottom:1.75rem;"></div>
    </div>
    <div id="viewBody">
        <div class="skel" style="height:220px;border-radius:var(--radius-lg);"></div>
    </div>
</div>

<script>window.SIDEBAR_PAGE = 'learn';</script>
<script src="../js/sidebar.js"></script>
<script>
const API   = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
if (!token) location.href = 'login.html';

const id = new URLSearchParams(location.search).get('id');
if (!id) location.href = 'learn.html';

// ── Code block registry (index → {code, lang}) ────────────────────────────────
const codeBlocks = [];

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
    try {
        const res  = await fetch(`${API}/contributions/${id}`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (!data.success || !data.contribution) throw new Error('Not found');
        render(data.contribution);
    } catch {
        document.getElementById('viewHeader').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-muted);">Content not found.</div>`;
        document.getElementById('viewBody').innerHTML   = '';
    }
}

// ── Header render ─────────────────────────────────────────────────────────────
function render(c) {
    document.title = `${c.title} – CodeArena`;
    const authorInitials = (c.author_name || 'F').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const tags = (c.tags||'').split(',').map(t=>t.trim()).filter(Boolean);

    document.getElementById('viewHeader').innerHTML = `
        <div class="view-header">
            <span class="view-type-badge ${c.type}">
                <span class="material-symbols-outlined" style="font-size:0.85rem;">${c.type==='blog'?'article':'school'}</span>
                ${c.type === 'blog' ? 'Blog Post' : 'Course'}
            </span>
            <h1 class="view-title">${esc(c.title)}</h1>
            ${c.description ? `<p style="font-size:0.88rem;color:rgba(255,255,255,0.55);margin:0 0 0.85rem;position:relative;">${esc(c.description)}</p>` : ''}
            <div class="view-meta">
                <span>
                    <div class="view-author-avatar">${c.author_avatar ? `<img src="${esc(c.author_avatar)}">` : authorInitials}</div>
                    ${esc(c.author_name || 'Faculty')}
                </span>
                <span><span class="material-symbols-outlined">translate</span>${langLabel(c.language)}</span>
                <span><span class="material-symbols-outlined">visibility</span>${c.view_count||0} views</span>
                <span><span class="material-symbols-outlined">calendar_today</span>${fmtDate(c.created_at)}</span>
            </div>
            ${tags.length ? `<div class="tag-row">${tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>`;

    if (c.type === 'blog') renderBlog(c);
    else renderCourse(c);
}

// ── Shared content renderer (handles code fences) ─────────────────────────────
function renderContent(text) {
    const lines   = (text || '').split('\n');
    let html      = '';
    let inCode    = false;
    let codeLang  = '';
    let codeLines = [];

    const PLAYGROUND_LANGS = new Set(['python','javascript','java','cpp']);
    const LANG_ALIAS = { py:'python', js:'javascript', 'c++':'cpp', 'c#':'csharp' };

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (!inCode) {
            // Detect opening fence: ```lang or ```
            const fenceMatch = line.match(/^```(\w*)\s*$/);
            if (fenceMatch) {
                inCode    = true;
                codeLang  = fenceMatch[1].toLowerCase() || 'plaintext';
                codeLines = [];
                continue;
            }

            const trimmed = line.trim();
            if (!trimmed) continue; // blank line — skip

            // ALL CAPS line (length > 2, contains a letter) → section header
            if (trimmed === trimmed.toUpperCase() && trimmed.length > 2 && /[A-Z]/.test(trimmed)) {
                html += `<div class="blog-section-head">${esc(trimmed)}</div>`;
            } else {
                html += `<p>${esc(trimmed)}</p>`;
            }
        } else {
            // Inside code block — look for closing fence
            if (line.trim() === '```') {
                const code = codeLines.join('\n');

                // Auto-detect language from code content when fence has no lang tag
                let resolvedLang = codeLang;
                if (resolvedLang === 'plaintext' && code.trim()) {
                    if (/\bprint\s*\(|^\s*def\s+\w+|^\s*import\s+\w+|:\s*$/.test(code))           resolvedLang = 'python';
                    else if (/console\.log|^\s*(const|let|var)\s+|function\s+\w+/.test(code))       resolvedLang = 'javascript';
                    else if (/System\.out\.print|public\s+class\s+\w+/.test(code))                  resolvedLang = 'java';
                    else if (/#include|cout\s*<<|int\s+main\s*\(/.test(code))                        resolvedLang = 'cpp';
                }

                const displayLang = resolvedLang === 'plaintext' ? '' : resolvedLang;
                const playLang    = LANG_ALIAS[resolvedLang] || resolvedLang;
                const canTry      = PLAYGROUND_LANGS.has(playLang);
                const idx = codeBlocks.length;
                codeBlocks.push({ code, lang: playLang, displayLang });

                html += `
                <div class="code-block">
                    <div class="code-block-header">
                        <span class="code-lang-label">${displayLang || 'code'}</span>
                        <button class="code-copy-btn" onclick="copyCode(this)" data-idx="${idx}">
                            <span class="material-symbols-outlined">content_copy</span>Copy
                        </button>
                    </div>
                    <pre><code class="language-${esc(displayLang || 'plaintext')}">${esc(code)}</code></pre>
                    <div class="code-cta-bar">
                        ${canTry ? `<button class="cta-btn cta-try" onclick="tryCode(${idx})">
                            <span class="material-symbols-outlined">play_arrow</span>Try it in Playground
                        </button>` : ''}
                        <button class="cta-btn cta-ai" onclick="openAskAI(${idx})">
                            <span class="material-symbols-outlined">auto_awesome</span>Ask AI Assistant
                        </button>
                    </div>
                </div>`;

                inCode    = false;
                codeLines = [];
                codeLang  = '';
            } else {
                codeLines.push(line);
            }
        }
    }

    // Unclosed fence — render as code anyway
    if (inCode && codeLines.length) {
        html += `<div class="code-block"><pre><code>${esc(codeLines.join('\n'))}</code></pre></div>`;
    }

    return html || '<p style="color:var(--text-muted)">No content yet.</p>';
}

// ── Blog ──────────────────────────────────────────────────────────────────────
function renderBlog(c) {
    const html = renderContent(c.content);
    document.getElementById('viewBody').innerHTML = `<div class="blog-body">${html}</div>`;
    document.querySelectorAll('.code-block pre code').forEach(el => hljs.highlightElement(el));
}

// ── Course ────────────────────────────────────────────────────────────────────
function renderCourse(c) {
    let sections = [];
    try { sections = JSON.parse(c.content || '[]'); } catch { sections = []; }

    const progressKey = `course_progress_${id}`;
    let completed = JSON.parse(localStorage.getItem(progressKey) || '[]');
    const pct = sections.length ? Math.round(completed.length / sections.length * 100) : 0;

    const progressBar = sections.length ? `
        <div class="course-progress-bar-wrap">
            <div class="course-progress-bar">
                <div class="course-progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="course-progress-label">${completed.length}/${sections.length} sections · ${pct}% done</div>
        </div>` : '';

    const sectionsHtml = sections.map((s, i) => {
        const sectionContent = renderContent(s.content);
        const isDone = completed.includes(i);
        return `
        <div class="course-section${i===0?' open':''}" id="sec-${i}">
            <div class="course-section-header" onclick="toggleSection(${i})">
                <div class="section-num-badge">${i+1}</div>
                <div class="section-header-title">${esc(s.title || `Section ${i+1}`)}</div>
                <span class="material-symbols-outlined section-chevron">expand_more</span>
            </div>
            <div class="course-section-body">
                ${sectionContent}
                <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);">
                    <button class="btn btn-secondary" style="font-size:0.78rem;"
                        id="markBtn-${i}" onclick="markDone(${i}, ${sections.length})">
                        <span class="material-symbols-outlined" style="font-size:0.9rem;">${isDone?'check_circle':'radio_button_unchecked'}</span>
                        ${isDone?'Completed':'Mark as done'}
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('viewBody').innerHTML = `
        ${progressBar}
        <div class="course-sections">${sectionsHtml || '<p style="color:var(--text-muted);text-align:center;">No sections added yet.</p>'}</div>`;

    document.querySelectorAll('.code-block pre code').forEach(el => hljs.highlightElement(el));
}

// ── AI Assistant panel ────────────────────────────────────────────────────────
let _aiIdx       = null;   // which code block is in context
let _aiHistory   = [];     // conversation history for this session
const _aiUserInitials = ((JSON.parse(localStorage.getItem('user')||'{}').full_name||'U').split(' ').map(w=>w[0]).join('').slice(0,2)||'U').toUpperCase();

function openAskAI(idx) {
    _aiIdx = idx;
    _aiHistory = [];

    // Show code preview (up to 10 lines)
    const { code, lang } = codeBlocks[idx] || { code: '', lang: '' };
    const preview = code.split('\n').slice(0, 10).join('\n');
    const ctx     = document.getElementById('aiCodeCtx');
    document.getElementById('aiCodePre').textContent = preview;
    ctx.style.display = code ? '' : 'none';

    // Clear messages, add welcome
    const msgs = document.getElementById('aiMessages');
    msgs.innerHTML = '';
    appendAIMsg('ai', `Hi! I can see the **${lang || 'code'}** snippet above. What would you like to know about it?\n\nYou can ask me to explain it, help debug, suggest improvements, or anything else!`);

    document.getElementById('aiOverlay').classList.add('open');
    setTimeout(() => document.getElementById('aiInput').focus(), 200);
}

function closeAskAI() {
    document.getElementById('aiOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('aiOverlay')) closeAskAI();
}

async function sendAIMessage() {
    const input  = document.getElementById('aiInput');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    input.style.height = 'auto';

    appendAIMsg('user', question);
    const typingEl = appendTyping();

    const sendBtn = document.getElementById('aiSendBtn');
    sendBtn.disabled = true;

    const { code, lang } = codeBlocks[_aiIdx] || { code: '', lang: '' };

    try {
        const res  = await fetch(`${API}/ai/ask-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ code, language: lang, question, conversationHistory: _aiHistory })
        });
        const data = await res.json();
        typingEl.remove();
        const reply = data.reply || 'Sorry, I couldn\'t generate a response. Please try again.';
        _aiHistory.push({ role: 'user', content: question });
        _aiHistory.push({ role: 'assistant', content: reply });
        appendAIMsg('ai', reply);
    } catch {
        typingEl.remove();
        appendAIMsg('ai', 'Connection error. Please check your network and try again.');
    } finally {
        sendBtn.disabled = false;
        input.focus();
    }
}

function appendAIMsg(role, text) {
    const msgs = document.getElementById('aiMessages');
    const isAI = role === 'ai';
    const div  = document.createElement('div');
    div.className = `ai-msg ${isAI ? 'ai' : 'user'}`;
    div.innerHTML = `
        <div class="ai-avatar ${isAI ? 'bot' : 'user-av'}">
            ${isAI ? '<span class="material-symbols-outlined">auto_awesome</span>' : _aiUserInitials}
        </div>
        <div class="ai-msg-bubble">${esc(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
}

function appendTyping() {
    const msgs = document.getElementById('aiMessages');
    const div  = document.createElement('div');
    div.className = 'ai-msg ai';
    div.innerHTML = `
        <div class="ai-avatar bot"><span class="material-symbols-outlined">auto_awesome</span></div>
        <div class="ai-typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
}

// ── Try it ────────────────────────────────────────────────────────────────────
function tryCode(idx) {
    const { code, lang } = codeBlocks[idx];
    localStorage.setItem('playgroundCode',   code);
    localStorage.setItem('playgroundLang',   lang);
    localStorage.setItem('playgroundSource', 'learn');
    location.href = 'playground.html';
}

// ── Copy code ─────────────────────────────────────────────────────────────────
function copyCode(btn) {
    const idx  = parseInt(btn.dataset.idx);
    const code = codeBlocks[idx]?.code || btn.closest('.code-block').querySelector('pre').textContent;
    navigator.clipboard.writeText(code).then(() => {
        btn.innerHTML = '<span class="material-symbols-outlined">check</span>Copied!';
        setTimeout(() => { btn.innerHTML = '<span class="material-symbols-outlined">content_copy</span>Copy'; }, 2000);
    });
}

// ── Section toggle ────────────────────────────────────────────────────────────
function toggleSection(i) {
    document.getElementById(`sec-${i}`).classList.toggle('open');
}

// ── Mark done ─────────────────────────────────────────────────────────────────
function markDone(i, total) {
    const progressKey = `course_progress_${id}`;
    let completed = JSON.parse(localStorage.getItem(progressKey) || '[]');
    completed = completed.includes(i) ? completed.filter(x => x !== i) : [...completed, i];
    localStorage.setItem(progressKey, JSON.stringify(completed));
    fetch(`${API}/contributions/${id}`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r=>r.json()).then(d=>{ if(d.contribution) renderCourse(d.contribution); }).catch(()=>{});
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function langLabel(l) {
    return { general:'General', python:'Python', javascript:'JavaScript', java:'Java', cpp:'C++' }[l] || l || 'General';
}
function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
